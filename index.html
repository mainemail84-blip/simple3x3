<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>simple3x3</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0a;
    --card:#121212;
    --accent:#c9a23d;
    --text:#f0f0f0;
    --dim:#aaaaaa;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:'Vazirmatn', sans-serif;
    background:var(--bg); color:var(--text);
  }
  .app{max-width:430px; margin:0 auto; min-height:100vh; padding-bottom:80px;}

  /* Header */
  .header{
    padding:20px 16px 12px;
    text-align:center;
    background:#111;
  }
  .logo{
    font-size:28px; font-weight:900; color:var(--accent);
  }
  .subtitle{font-size:13.5px; color:#888; margin-top:4px;}

  .search{
    margin:15px 16px;
    position:relative;
  }
  .search input{
    width:100%; padding:14px 20px 14px 50px;
    background:#1c1c1c; border:1px solid #333; border-radius:16px;
    color:white; font-size:15px;
  }
  .search i{position:absolute; left:18px; top:50%; transform:translateY(-50%); color:#777;}

  /* Categories Grid - 3x3 */
  .cat-grid{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:14px;
    padding:10px 16px;
  }
  .cat-item{
    background:var(--card);
    border-radius:18px;
    padding:16px 10px;
    text-align:center;
    border:1px solid #222;
    cursor:pointer;
    transition:0.3s;
  }
  .cat-item:hover{transform:scale(1.06);}
  .cat-item .icon{
    font-size:42px;
    margin-bottom:10px;
    height:60px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .cat-name{
    font-weight:700;
    font-size:14.5px;
  }

  /* Items View */
  .items-view{
    display:none;
    padding:10px 16px;
  }
  .back-btn{
    background:none; border:none; color:var(--accent);
    font-size:18px; padding:10px 0; margin-bottom:10px;
    cursor:pointer;
  }
  .menu-grid{
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap:12px;
  }
  .menu-item{
    background:var(--card);
    border-radius:16px;
    padding:12px;
    text-align:center;
  }
  .menu-item img, .menu-item .emoji{
    width:100%; height:110px; object-fit:cover; border-radius:12px;
  }
  .menu-item .emoji{
    background:#222; font-size:48px; display:flex; align-items:center; justify-content:center;
  }
  .menu-name{font-weight:700; margin:10px 0 6px;}
  .menu-price{color:var(--accent); font-weight:800; font-size:15px;}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="logo">simple3x3</div>
    <div class="subtitle">کافه و رستوران</div>
  </div>

  <div class="search">
    <input id="searchInput" type="text" placeholder="جستجو...">
    <i class="fa-solid fa-magnifying-glass"></i>
  </div>

  <!-- Categories Grid -->
  <div id="categoriesView">
    <div class="cat-grid" id="catGrid"></div>
  </div>

  <!-- Items View -->
  <div id="itemsView" class="items-view">
    <button class="back-btn" onclick="backToCategories()">
      ← بازگشت به دسته‌بندی‌ها
    </button>
    <h3 id="currentCatTitle" style="color:var(--accent); margin-bottom:15px;"></h3>
    <div class="menu-grid" id="menuGrid"></div>
  </div>

</div>

<script>
let menuItems = [];
let categories = [];

async function loadMenu(){
  try{
    const res = await fetch('menu-data.json?t=' + Date.now());
    menuItems = await res.json();
  }catch(e){
    console.error("خطا در بارگذاری منو", e);
  }
  renderCategories();
}

function getCategories(){
  const catMap = new Map();
  menuItems.forEach(item => {
    if(!catMap.has(item.category)){
      catMap.set(item.category, {
        name: item.category,
        emoji: item.categoryEmoji || item.emoji || '☕'  // اولویت: categoryEmoji -> emoji -> پیش‌فرض
      });
    }
  });
  return Array.from(catMap.values());
}

function renderCategories(){
  categories = getCategories();
  let html = '';

  categories.forEach(cat => {
    html += `
      <div class="cat-item" onclick="openCategory('${cat.name}')">
        <div class="icon">${cat.emoji}</div>
        <div class="cat-name">${cat.name}</div>
      </div>`;
  });

  document.getElementById('catGrid').innerHTML = html;
}

function openCategory(catName){
  document.getElementById('categoriesView').style.display = 'none';
  document.getElementById('itemsView').style.display = 'block';
  
  document.getElementById('currentCatTitle').textContent = catName;

  const filtered = menuItems.filter(i => i.category === catName);
  let html = '';

  filtered.forEach(item => {
    const price = Number(item.price);
    const hasPrice = !isNaN(price) && price > 0;

    const emojiHTML = item.emoji ? 
      `<div class="emoji">${item.emoji}</div>` : 
      (item.image ? `<img src="${item.image}" alt="">` : `<div class="emoji">☕</div>`);

    html += `
      <div class="menu-item">
        ${emojiHTML}
        <div class="menu-name">${item.name}</div>
        ${hasPrice ? `<div class="menu-price">${price.toLocaleString('fa-IR')} تومان</div>` : ''}
      </div>`;
  });

  document.getElementById('menuGrid').innerHTML = html;
}

function backToCategories(){
  document.getElementById('itemsView').style.display = 'none';
  document.getElementById('categoriesView').style.display = 'block';
}

// Search
document.getElementById('searchInput').addEventListener('input', (e) => {
  if(e.target.value.trim() !== ''){
    backToCategories();
  }
});

loadMenu();
</script>
</body>
</html>
