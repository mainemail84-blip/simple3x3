<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>simple3x3 • منو</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0a;
    --card:#121212;
    --accent:#c9a23d;
    --text:#f0f0f0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:'Vazirmatn', sans-serif;
    background:var(--bg); color:var(--text);
  }
  .app{max-width:430px; margin:0 auto; min-height:100vh; padding-bottom:80px;}

  .header{
    padding:20px 16px 12px;
    text-align:center;
    background:#111;
  }
  .logo{
    font-size:26px; font-weight:900; color:var(--accent);
  }
  .subtitle{font-size:13.5px; color:#888; margin-top:4px;}

  .search{
    margin:15px 16px;
    position:relative;
  }
  .search input{
    width:100%; padding:14px 20px 14px 50px;
    background:#1c1c1c; border:1px solid #333; border-radius:16px;
    color:white; font-size:15px;
  }
  .search i{position:absolute; left:18px; top:50%; transform:translateY(-50%); color:#777;}

  .cat-grid{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:14px;
    padding:10px 16px;
  }
  .cat-item{
    background:var(--card);
    border-radius:18px;
    padding:16px 10px;
    text-align:center;
    border:1px solid #222;
    cursor:pointer;
    transition:all 0.3s ease;
  }
  .cat-item:hover{transform:scale(1.08);}

  .cat-item .icon{
    font-size:42px;
    margin-bottom:10px;
    height:65px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .cat-name{font-weight:700; font-size:14.5px;}

  .items-view{
    display:none;
    padding:10px 16px;
  }
  .items-view.active{
    display:block;
    animation: fadeInUp 0.4s ease forwards;
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .top-bar-items{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:12px;
  }
  .back-btn{
    background:none; border:none; color:var(--accent);
    font-size:17px; padding:8px 12px; cursor:pointer;
  }

  .menu-grid{
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap:12px;
  }
  .menu-item{
    background:var(--card);
    border-radius:16px;
    padding:12px;
    text-align:center;
    animation: popIn 0.5s ease forwards;
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.8) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .menu-item img{
    width:100%; 
    height:125px; 
    object-fit:cover; 
    border-radius:12px;
    background:#1a1a1a;
  }
  .menu-item .emoji{
    width:100%; 
    height:125px; 
    background:#222; 
    border-radius:12px;
    font-size:48px; 
    display:flex; 
    align-items:center; 
    justify-content:center;
  }
  .menu-name{font-weight:700; margin:10px 0 6px; font-size:15px;}
  .menu-price{color:var(--accent); font-weight:800; font-size:15px;}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="logo">SIMPLE3X3</div>
    <div class="subtitle">منو دیجیتال</div>
  </div>

  <div class="search">
    <input id="searchInput" type="text" placeholder="جستجو...">
    <i class="fa-solid fa-magnifying-glass"></i>
  </div>

  <div id="categoriesView">
    <div class="cat-grid" id="catGrid"></div>
  </div>

  <div id="itemsView" class="items-view">
    <div class="top-bar-items">
      <button class="back-btn" onclick="backToCategories()">
        ← بازگشت
      </button>
      <h3 id="currentCatTitle" style="color:var(--accent); margin:0;"></h3>
    </div>
    <div class="menu-grid" id="menuGrid"></div>
  </div>

</div>

<script>
let menuItems = [];

async function loadMenu(){
  try{
    const res = await fetch('menu-data.json?t=' + Date.now());
    menuItems = await res.json();
    renderCategories();
  }catch(e){
    console.error("خطا:", e);
    document.getElementById('catGrid').innerHTML = `<p style="text-align:center;padding:60px;color:#666;">فایل menu-data.json پیدا نشد</p>`;
  }
}

function getCategories(){
  const catMap = new Map();
  menuItems.forEach(item => {
    if(!catMap.has(item.category)){
      catMap.set(item.category, {
        name: item.category,
        emoji: item.categoryEmoji || item.emoji || '☕'
      });
    }
  });
  return Array.from(catMap.values());
}

function renderCategories(){
  const categories = getCategories();
  let html = '';
  categories.forEach(cat => {
    html += `
      <div class="cat-item" onclick="openCategory('${cat.name}')">
        <div class="icon">${cat.emoji}</div>
        <div class="cat-name">${cat.name}</div>
      </div>`;
  });
  document.getElementById('catGrid').innerHTML = html;
}

function openCategory(catName){
  document.getElementById('categoriesView').style.display = 'none';
  
  const itemsView = document.getElementById('itemsView');
  itemsView.style.display = 'block';
  document.getElementById('currentCatTitle').textContent = catName;

  const filtered = menuItems.filter(i => i.category === catName);
  let html = '';

  filtered.forEach((item, index) => {
    const price = Number(item.price);
    const hasPrice = !isNaN(price) && price > 0;

    let mediaHTML = `<div class="emoji">☕</div>`;

    if (item.image) {
      const imageSrc = item.image.startsWith('http') || item.image.startsWith('/') 
        ? item.image 
        : `images/${item.image}`;
      mediaHTML = `<img src="${imageSrc}" alt="${item.name}" onerror="this.outerHTML='<div class=\\'emoji\\'>☕</div>'">`;
    } else if (item.emoji) {
      mediaHTML = `<div class="emoji">${item.emoji}</div>`;
    }

    html += `
      <div class="menu-item" style="animation-delay: ${index * 0.06}s">
        ${mediaHTML}
        <div class="menu-name">${item.name}</div>
        ${hasPrice ? `<div class="menu-price">${price.toLocaleString('fa-IR')} تومان</div>` : ''}
      </div>`;
  });

  document.getElementById('menuGrid').innerHTML = html;
}

function backToCategories(){
  document.getElementById('itemsView').style.display = 'none';
  document.getElementById('categoriesView').style.display = 'block';
}

document.getElementById('searchInput').addEventListener('input', backToCategories);

loadMenu();
</script>
</body>
</html>
